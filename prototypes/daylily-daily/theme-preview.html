<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - Design System 展示</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'rgb(var(--brand-primary) / <alpha-value>)',
              secondary: 'rgb(var(--brand-secondary) / <alpha-value>)',
              'primary-muted': 'rgb(var(--brand-primary-muted) / <alpha-value>)',
              'secondary-muted': 'rgb(var(--brand-secondary-muted) / <alpha-value>)',
            },
            surface: {
              base: 'rgb(var(--surface-base) / <alpha-value>)',
              container: 'rgb(var(--surface-container) / <alpha-value>)',
              elevated: 'rgb(var(--surface-elevated) / <alpha-value>)',
            },
            content: {
              primary: 'rgb(var(--content-primary) / <alpha-value>)',
              secondary: 'rgb(var(--content-secondary) / <alpha-value>)',
              inverse: 'rgb(var(--content-inverse) / <alpha-value>)',
            },
            border: {
              subtle: 'rgb(var(--border-subtle) / <alpha-value>)',
            },
            feedback: {
              success: 'rgb(var(--feedback-success) / <alpha-value>)',
              'success-bg': 'rgb(var(--feedback-success-bg) / <alpha-value>)',
              'success-text': 'rgb(var(--feedback-success-text) / <alpha-value>)',
              warning: 'rgb(var(--feedback-warning) / <alpha-value>)',
              'warning-bg': 'rgb(var(--feedback-warning-bg) / <alpha-value>)',
              'warning-text': 'rgb(var(--feedback-warning-text) / <alpha-value>)',
            }
          },
          boxShadow: {
            'brand-sm': '0 2px 4px -1px rgb(var(--shadow-color) / 0.06), 0 1px 2px -1px rgb(var(--shadow-color) / 0.04)',
            'brand-md': '0 4px 6px -1px rgb(var(--shadow-color) / 0.1), 0 2px 4px -2px rgb(var(--shadow-color) / 0.05)',
          },
          /* 核心 Typography Tokens 映射 */
          fontSize: {
            'title-1': ['1.875rem', { lineHeight: '1.2', letterSpacing: '-0.02em', fontWeight: '700' }],
            'title-2': ['1.5rem', { lineHeight: '1.25', letterSpacing: '-0.01em', fontWeight: '600' }],
            'title-3': ['1.25rem', { lineHeight: '1.3', fontWeight: '600' }],
            'body-lg': ['1.125rem', { lineHeight: '1.5', fontWeight: '400' }],
            'body-base': ['1rem', { lineHeight: '1.5', fontWeight: '400' }],
            'body-sm': ['0.875rem', { lineHeight: '1.5', fontWeight: '400' }],
            'caption': ['0.75rem', { lineHeight: '1.4', fontWeight: '400' }],
          }
        }
      }
    }
  </script>
  <style>
    /* 交互遮罩 */
    .active-overlay { position: relative; overflow: hidden; }
    .active-overlay::after { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0); transition: background-color 0.1s; pointer-events: none; }
    .active-overlay:active::after { background-color: rgba(0,0,0,0.08); }
    .dark .active-overlay:active::after { background-color: rgba(255,255,255,0.12); }

    /* 隐藏滚动条但保持可滚动 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-neutral-800 flex items-center justify-center min-h-screen font-sans antialiased p-4">

  <div class="relative w-full max-w-[375px] h-[812px] bg-surface-base rounded-[40px] shadow-2xl overflow-hidden flex flex-col transition-colors duration-300 border-[8px] border-neutral-900">
    
    <div class="h-12 w-full flex justify-between items-end px-6 pb-2 shrink-0 z-20">
      <span class="text-caption font-semibold text-content-primary">9:41</span>
      <div class="flex space-x-1 items-center">
        <div class="w-4 h-3 bg-content-primary mask mask-signal"></div>
        <div class="w-4 h-3 bg-content-primary mask mask-wifi"></div>
        <div class="w-6 h-3 border border-content-primary rounded-sm relative"><div class="absolute inset-0.5 bg-content-primary w-[80%] rounded-[1px]"></div></div>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto no-scrollbar pb-24">
      
      <header class="px-6 pt-6 pb-4">
        <div class="flex items-center justify-between mb-1">
          <h2 class="text-title-3 text-brand-primary">萱草日签</h2>
          
          <select id="theme-selector" onchange="changeTheme(this.value)" class="text-caption bg-surface-base border border-border-subtle rounded px-2 py-1 text-content-primary focus:outline-none focus:border-brand-primary cursor-pointer">
            <option value="default">默认暖橙方案</option>
            <option value="ocean">海洋蓝调方案</option>
            <option value="nature">自然生机方案</option>
          </select>
        </div>
        
        <h1 class="text-title-1 text-content-primary flex items-center justify-between">
          早安，奶奶
          <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-surface-container shadow-brand-sm active-overlay text-content-secondary" title="切换深色/浅色模式">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          </button>
        </h1>
        <p class="text-body-sm text-content-secondary mt-1">今天也要按时吃药哦，家人都在关心您。</p>
      </header>

      <section class="px-4 mb-6">
        <div class="bg-surface-container rounded-3xl p-5 shadow-brand-sm border border-border-subtle">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-title-3 text-content-primary">今日进度</h3>
            <span class="text-title-2 text-brand-primary font-bold">2<span class="text-body-sm text-content-secondary font-normal"> / 3 次</span></span>
          </div>
          <div class="h-3 w-full bg-surface-base rounded-full overflow-hidden">
            <div class="h-full bg-brand-primary w-2/3 rounded-full transition-all duration-500"></div>
          </div>
        </div>
      </section>

      <section class="px-4 space-y-3">
        <h3 class="text-body-lg font-semibold text-content-primary px-2 mb-2">上午用药 (08:00)</h3>
        
        <div class="bg-surface-container rounded-2xl p-4 flex items-center shadow-brand-sm border border-border-subtle active-overlay">
          <div class="w-12 h-12 rounded-xl bg-feedback-success-bg text-feedback-success-text flex items-center justify-center mr-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
          </div>
          <div class="flex-1">
            <div class="text-body-base font-semibold text-content-primary">降压药 (氨氯地平)</div>
            <div class="text-body-sm text-content-secondary mt-0.5">1片 · 饭后服用</div>
          </div>
          <span class="text-caption text-feedback-success font-medium bg-feedback-success-bg px-2 py-1 rounded-md">已打卡</span>
        </div>

        <div class="bg-surface-container rounded-2xl p-4 flex items-center shadow-brand-sm border border-brand-primary/30 active-overlay">
          <div class="w-12 h-12 rounded-xl bg-brand-primary-muted text-brand-primary flex items-center justify-center mr-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </div>
          <div class="flex-1">
            <div class="text-body-base font-semibold text-content-primary">保健品 (鱼油)</div>
            <div class="text-body-sm text-content-secondary mt-0.5">2粒 · 随餐服用</div>
          </div>
          <button class="bg-brand-primary text-content-inverse text-body-sm font-medium px-4 py-2 rounded-full active-overlay">
            去打卡
          </button>
        </div>
      </section>

      <section class="px-4 mt-8">
        <h3 class="text-body-lg font-semibold text-content-primary px-2 mb-3">家庭关怀圈</h3>
        <div class="bg-surface-elevated rounded-2xl p-4 shadow-brand-md border border-border-subtle flex items-center justify-between">
          <div class="flex -space-x-3">
            <img class="w-10 h-10 rounded-full border-2 border-surface-elevated" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=ffedd5" alt="Son" />
            <img class="w-10 h-10 rounded-full border-2 border-surface-elevated" src="https://api.dicebear.com/7.x/notionists/svg?seed=Aneka&backgroundColor=ccfbf1" alt="Daughter" />
            <div class="w-10 h-10 rounded-full border-2 border-surface-elevated bg-neutral-200 dark:bg-neutral-700 flex items-center justify-center text-caption text-content-secondary">+2</div>
          </div>
          <button class="text-body-sm text-brand-primary font-medium active-overlay p-2">查看家人提醒</button>
        </div>
      </section>

    </div>

    <div class="absolute bottom-0 w-full h-20 bg-surface-container/90 backdrop-blur-md border-t border-border-subtle flex justify-around items-center px-4 pb-4 z-20">
      <div class="flex flex-col items-center justify-center w-16 text-brand-primary">
        <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L4 9v12h16V9l-8-6zm0 2.5l6 4.5v9h-12v-9l6-4.5z"/></svg>
        <span class="text-caption font-medium">今日</span>
      </div>
      <div class="flex flex-col items-center justify-center w-16 text-content-secondary active-overlay rounded-lg">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
        <span class="text-caption font-medium">记录</span>
      </div>
      <div class="flex flex-col items-center justify-center w-16 text-content-secondary active-overlay rounded-lg">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        <span class="text-caption font-medium">我的</span>
      </div>
    </div>

  </div>

  <script>
    function toggleDarkMode() {
      const html = document.documentElement;
      if (html.classList.contains('light')) {
        html.classList.replace('light', 'dark');
      } else {
        html.classList.replace('dark', 'light');
      }
    }
    
    function changeTheme(themeName) {
      document.getElementById('theme-css').href = `themes/${themeName}.css`;
    }
  </script>
</body>
</html>
