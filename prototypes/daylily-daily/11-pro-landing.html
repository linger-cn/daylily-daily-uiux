<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - 升级亲情版</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'rgb(var(--brand-primary) / <alpha-value>)',
              secondary: 'rgb(var(--brand-secondary) / <alpha-value>)',
              'primary-muted': 'rgb(var(--brand-primary-muted) / <alpha-value>)',
              premium: '#D4AF37', /* 温暖的香槟金 */
              'premium-light': '#FDF9E3',
            },
            surface: {
              base: 'rgb(var(--surface-base) / <alpha-value>)',
              container: 'rgb(var(--surface-container) / <alpha-value>)',
              elevated: 'rgb(var(--surface-elevated) / <alpha-value>)',
            },
            content: {
              primary: 'rgb(var(--content-primary) / <alpha-value>)',
              secondary: 'rgb(var(--content-secondary) / <alpha-value>)',
              inverse: 'rgb(var(--content-inverse) / <alpha-value>)',
            },
          },
          boxShadow: {
            'premium': '0 10px 30px -10px rgba(212, 175, 55, 0.4)',
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .bottom-sheet {
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bottom-sheet.open {
      transform: translateY(0);
    }
    .overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .btn-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .btn-bounce:active { transform: scale(0.96); }
    
    /* 渐变流光文字 */
    .text-gradient {
      background: linear-gradient(135deg, #B8860B, #FFD700, #DAA520);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body class="bg-neutral-100 flex items-center justify-center min-h-screen font-sans antialiased text-[#4A443F]">

  <div class="relative w-full max-w-[375px] h-[812px] bg-[#F9F7F3] shadow-2xl overflow-hidden flex flex-col border-[8px] border-neutral-900 rounded-[50px]">
    
    <!-- 导航栏 -->
    <div class="shrink-0 z-50 bg-[#F9F7F3]/80 backdrop-blur-md">
      <div class="h-11 w-full"></div>
      <div class="h-11 w-full flex items-center justify-between px-4 relative">
        <div class="w-20 flex items-center cursor-pointer" onclick="history.back()">
          <svg class="w-6 h-6 text-neutral-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </div>
        <h2 class="text-[19px] font-bold text-[#2D2926]">升级亲情版</h2>
        <div class="w-20"></div>
      </div>
    </div>

    <!-- 主体内容 -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32">
      
      <!-- Hero 沉浸式展示 -->
      <section class="relative w-full h-64 bg-neutral-800 overflow-hidden">
        <!-- 模拟长辈全家福背景 -->
        <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=600&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-60" alt="Family Background">
        <!-- 渐变遮罩 -->
        <div class="absolute inset-0 bg-gradient-to-t from-[#F9F7F3] via-transparent to-transparent"></div>
        
        <!-- 模拟长辈首页居中打卡 -->
        <div class="absolute inset-0 flex flex-col items-center justify-center">
           <div class="w-24 h-24 rounded-full bg-white/20 backdrop-blur-md border border-white/40 flex items-center justify-center shadow-lg animate-pulse">
              <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
              </svg>
           </div>
           <div class="mt-4 px-4 py-2 bg-black/40 backdrop-blur-sm rounded-full flex items-center gap-2">
             <svg class="w-4 h-4 text-brand-premium" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
             <span class="text-white text-sm font-medium">“爸，吃完药点这里哦”</span>
           </div>
        </div>
      </section>

      <!-- 核心价值点 -->
      <section class="px-6 -mt-6 relative z-10">
        <div class="text-center mb-6">
          <h1 class="text-2xl font-bold text-gradient mb-1">萱草亲情定制包</h1>
          <p class="text-[14px] text-content-secondary">用更温暖的方式，陪伴长辈的每一次用药</p>
        </div>

        <div class="space-y-4">
          <!-- 特权 1 -->
          <div class="bg-white rounded-3xl p-5 shadow-sm border border-brand-premium/20">
             <div class="flex items-start">
               <div class="w-10 h-10 rounded-full bg-brand-premium/10 flex items-center justify-center shrink-0">
                 <svg class="w-5 h-5 text-brand-premium" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>
               </div>
               <div class="ml-4">
                 <h3 class="text-[16px] font-bold text-[#2D2926]">专属亲情语音播报</h3>
                 <p class="text-[13px] text-content-secondary mt-1 leading-relaxed">不再是冰冷的机器音。用您真实的声音，每天定时提醒长辈按时服药。</p>
                 <button class="mt-3 text-[12px] font-bold text-brand-premium flex items-center bg-brand-premium/5 px-3 py-1.5 rounded-full btn-bounce">
                   <svg class="w-3.5 h-3.5 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>试听 Demo
                 </button>
               </div>
             </div>
          </div>

          <!-- 特权 2 -->
          <div class="bg-white rounded-3xl p-5 shadow-sm border border-brand-premium/20">
             <div class="flex items-start">
               <div class="w-10 h-10 rounded-full bg-brand-premium/10 flex items-center justify-center shrink-0">
                 <svg class="w-5 h-5 text-brand-premium" fill="currentColor" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
               </div>
               <div class="ml-4">
                 <h3 class="text-[16px] font-bold text-[#2D2926]">家庭相册背景墙</h3>
                 <p class="text-[13px] text-content-secondary mt-1 leading-relaxed">上传全家福或孙辈的照片，作为长辈打卡页的专属半透明背景。</p>
               </div>
             </div>
          </div>

          <!-- 特权 3 -->
          <div class="bg-white rounded-3xl p-5 shadow-sm border border-brand-premium/20 opacity-80">
             <div class="flex items-start">
               <div class="w-10 h-10 rounded-full bg-brand-premium/10 flex items-center justify-center shrink-0">
                 <svg class="w-5 h-5 text-brand-premium" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
               </div>
               <div class="ml-4">
                 <h3 class="text-[16px] font-bold text-[#2D2926]">更详尽的温情周报</h3>
                 <p class="text-[13px] text-content-secondary mt-1 leading-relaxed">解锁家人互动统计与进阶的用药依从性趋势图表。</p>
               </div>
             </div>
          </div>
        </div>
      </section>

    </div>

    <!-- 底部购买动作区 -->
    <div class="absolute bottom-0 w-full bg-white/95 backdrop-blur-xl border-t border-black/5 pb-[env(safe-area-inset-bottom)] z-40">
      <div class="px-6 py-4">
        <!-- 选项 -->
        <div class="flex gap-3 mb-4">
          <div class="flex-1 border-2 border-brand-premium bg-brand-premium/5 rounded-2xl p-3 flex flex-col items-center justify-center relative cursor-pointer btn-bounce">
             <div class="absolute -top-2.5 bg-brand-premium text-white text-[10px] font-bold px-2 py-0.5 rounded-full">限时</div>
             <div class="text-[13px] font-medium text-content-secondary">连续包月</div>
             <div class="font-bold text-brand-premium mt-0.5"><span class="text-[12px]">￥</span>15</div>
          </div>
          <div class="flex-1 border border-neutral-200 bg-white rounded-2xl p-3 flex flex-col items-center justify-center cursor-pointer btn-bounce">
             <div class="text-[13px] font-medium text-content-secondary">买断终身</div>
             <div class="font-bold text-[#2D2926] mt-0.5"><span class="text-[12px]">￥</span>199</div>
          </div>
        </div>
        
        <button onclick="openBottomSheet()" class="w-full py-3.5 rounded-full bg-gradient-to-r from-[#D4AF37] to-[#B8860B] text-white font-bold text-[16px] shadow-premium btn-bounce">
          ￥15 立即开通
        </button>
        <p class="text-[11px] text-center text-content-secondary mt-3">开通即同意《亲情版服务协议》</p>
      </div>
      <!-- iOS Indicator -->
      <div class="w-1/3 h-1.5 bg-neutral-300 rounded-full mx-auto mb-2"></div>
    </div>

    <!-- 暗色遮罩 -->
    <div id="overlay" class="overlay absolute inset-0 bg-black/40 z-50" onclick="closeBottomSheet()"></div>

    <!-- 底部支付确认弹窗 (Bottom Sheet) -->
    <div id="payment-sheet" class="bottom-sheet absolute bottom-0 w-full bg-white rounded-t-[24px] z-[60] pb-[env(safe-area-inset-bottom)]">
      <div class="p-6">
        <div class="flex justify-between items-center mb-6">
          <div class="w-6"></div>
          <h3 class="text-[17px] font-bold text-[#2D2926]">确认付款</h3>
          <div class="w-6 h-6 flex items-center justify-center cursor-pointer" onclick="closeBottomSheet()">
            <svg class="w-5 h-5 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </div>
        </div>
        
        <div class="text-center mb-8">
          <div class="text-[36px] font-bold text-[#2D2926]">￥15.00</div>
          <div class="text-[14px] text-content-secondary mt-1">萱草日签 - 亲情定制包 (连续包月)</div>
        </div>

        <div class="space-y-4 mb-8">
          <div class="flex justify-between items-center py-2 border-b border-neutral-100">
            <span class="text-[14px] text-content-secondary">收款方</span>
            <span class="text-[14px] font-medium text-[#2D2926]">萱草日签</span>
          </div>
          <div class="flex justify-between items-center py-2 border-b border-neutral-100">
            <span class="text-[14px] text-content-secondary">支付方式</span>
            <div class="flex items-center">
              <svg class="w-4 h-4 text-green-500 mr-1.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
              <span class="text-[14px] font-medium text-[#2D2926]">微信支付</span>
              <svg class="w-4 h-4 text-neutral-400 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </div>
          </div>
        </div>

        <button onclick="confirmPayment()" class="w-full py-3.5 rounded-lg bg-[#07C160] text-white font-bold text-[16px] btn-bounce mb-2">
          确认支付
        </button>
      </div>
    </div>

  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const paymentSheet = document.getElementById('payment-sheet');

    function openBottomSheet() {
      overlay.classList.add('open');
      paymentSheet.classList.add('open');
    }

    function closeBottomSheet() {
      overlay.classList.remove('open');
      paymentSheet.classList.remove('open');
    }

    function confirmPayment() {
      // 模拟支付 loading 和成功跳转
      const btn = document.querySelector('#payment-sheet button');
      btn.innerHTML = '<svg class="animate-spin h-5 w-5 mx-auto text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
      
      setTimeout(() => {
        window.location.href = '12-pro-setup.html';
      }, 1000);
    }
  </script>
</body>
</html>
