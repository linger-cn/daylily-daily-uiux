<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - 我的用药</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'rgb(var(--brand-primary) / <alpha-value>)',
              secondary: 'rgb(var(--brand-secondary) / <alpha-value>)',
              'primary-muted': 'rgb(var(--brand-primary-muted) / <alpha-value>)',
            },
            surface: {
              base: 'rgb(var(--surface-base) / <alpha-value>)',
              container: 'rgb(var(--surface-container) / <alpha-value>)',
              elevated: 'rgb(var(--surface-elevated) / <alpha-value>)',
            },
            border: {
              subtle: 'rgb(var(--border-subtle) / <alpha-value>)',
            },
            feedback: {
              success: 'rgb(var(--feedback-success) / <alpha-value>)',
            }
          },
          boxShadow: {
            'brand-sm': '0 2px 4px -1px rgb(var(--shadow-color) / 0.06), 0 1px 2px -1px rgb(var(--shadow-color) / 0.04)',
            'brand-md': '0 4px 6px -1px rgb(var(--shadow-color) / 0.1), 0 2px 4px -2px rgb(var(--shadow-color) / 0.05)',
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .active-overlay { position: relative; overflow: hidden; }
    .active-overlay::after { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0); transition: background-color 0.1s; pointer-events: none; }
    .active-overlay:active::after { background-color: rgba(0,0,0,0.08); }
    
    /* 胶囊切换平滑过渡 */
    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* 用药计划列表项：展开操作区 */
    .plan-item-actions { max-height: 0; overflow: hidden; transition: max-height 0.32s ease; }
    .plan-list-item.is-open .plan-item-actions { max-height: 200px; }
    .plan-item-chevron { transition: transform 0.25s ease; }
    .plan-list-item.is-open .plan-item-chevron { transform: rotate(180deg); }
    .plan-chip { font-size: 10px; line-height: 1.2; padding: 3px 7px; border-radius: 9999px; font-weight: 600; letter-spacing: 0.02em; }
  </style>
</head>

    </div>

    <!-- 底部悬浮添加按钮 (大面积触控区适老) -->
    <div class="absolute bottom-[24px] mb-[env(safe-area-bottom)] left-6 right-6 z-40 transition-transform hover:-translate-y-1">
      <button class="w-full min-h-[56px] py-3.5 bg-brand-primary text-white rounded-[28px] text-[18px] font-bold shadow-brand-md active-overlay btn-bounce flex items-center justify-center gap-2" onclick="window.location.href='04-plan-create.html'">
        <svg class="w-6 h-6 -ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
        新增用药安排
      </button>
    </div>

    <!-- 安全区底色适配 -->
    <div class="absolute bottom-0 w-full h-[env(safe-area-inset-bottom)] bg-[#F9F7F3]"></div>
    <!-- 安全区提示条 (iOS Home Indicator) -->
    <div class="absolute bottom-1 w-1/3 h-1.5 bg-neutral-300 rounded-full left-1/2 -translate-x-1/2 opacity-50 z-50"></div>

  </div>

  <script>
    function switchTab(index) {
      document.querySelectorAll('.plan-list-item.is-open').forEach(function (el) {
        closePlanItem(el);
      });

      var indicator = document.getElementById('tab-indicator');
      var percentage = index * 100;
      indicator.style.transform = 'translateX(' + percentage + '%)';

      var btns = document.querySelectorAll('.tab-btn');
      btns.forEach(function (btn, i) {
        if (i === index) {
          btn.classList.remove('text-[#8C847E]');
          btn.classList.add('text-[#2D2926]');
        } else {
          btn.classList.remove('text-[#2D2926]');
          btn.classList.add('text-[#8C847E]');
        }
      });

      var contents = document.querySelectorAll('.tab-content');
      contents.forEach(function (content, i) {
        if (i === index) {
          content.classList.add('active');
        } else {
          content.classList.remove('active');
        }
      });
    }

    function closePlanItem(item) {
      if (!item) return;
      item.classList.remove('is-open');
      var panel = item.querySelector('.plan-item-actions');
      var btn = item.querySelector('.plan-item-chevron');
      if (panel) panel.style.maxHeight = '0';
      if (btn) btn.setAttribute('aria-expanded', 'false');
    }

    function togglePlanItem(chevronBtn) {
      var item = chevronBtn.closest('.plan-list-item');
      var panel = item.querySelector('.plan-item-actions');
      var willOpen = !item.classList.contains('is-open');

      document.querySelectorAll('.plan-list-item.is-open').forEach(function (el) {
        if (el !== item) closePlanItem(el);
      });

      if (willOpen) {
        item.classList.add('is-open');
        panel.style.maxHeight = panel.scrollHeight + 'px';
        chevronBtn.setAttribute('aria-expanded', 'true');
      } else {
        closePlanItem(item);
      }
    }

    function openPlanStub(kind, name) {
      if (kind === 'detail') {
        alert('计划详情（原型占位）：「' + name + '」\n可接独立详情页或小程序路由。');
      }
    }

    function planDemoFeedback(btn, msg) {
      var prev = btn.textContent;
      btn.textContent = msg;
      btn.disabled = true;
      setTimeout(function () {
        btn.textContent = prev;
        btn.disabled = false;
      }, 1600);
    }
  </script>
</body>
</html>
