<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - 功能许愿池</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#FF9500', 
              secondary: 'rgb(var(--brand-secondary) / <alpha-value>)',
              'primary-muted': 'rgb(var(--brand-primary-muted) / <alpha-value>)',
            },
            surface: {
              base: 'rgb(var(--surface-base) / <alpha-value>)',
              container: 'rgb(var(--surface-container) / <alpha-value>)',
              elevated: 'rgb(var(--surface-elevated) / <alpha-value>)',
            },
            feedback: {
              success: '#34C759',
              warning: '#FF3B30',
            }
          },
          boxShadow: {
            'brand-sm': '0 2px 4px -1px rgb(var(--shadow-color) / 0.06), 0 1px 2px -1px rgb(var(--shadow-color) / 0.04)',
            'brand-md': '0 4px 6px -1px rgb(var(--shadow-color) / 0.1), 0 2px 4px -2px rgb(var(--shadow-color) / 0.05)',
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .active-overlay { position: relative; overflow: hidden; }
    .active-overlay::after { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0); transition: background-color 0.1s; pointer-events: none; }
    .active-overlay:active::after { background-color: rgba(0,0,0,0.08); }
    /* Animated Progress Bar */
    .progress-bar { transition: width 1s ease-out; }
  </style>
  <script>
    function castVote(optionId) {
      // Mocking the voting behavior
      document.getElementById('voting-cards').style.display = 'none';
      document.getElementById('voting-results').style.display = 'block';
      
      // Simulate progress bar filling with a slight delay so CSS transitions trigger correctly
      setTimeout(() => {
        document.getElementById('bar-1').style.width = optionId === 1 ? '65%' : '45%';
        document.getElementById('bar-2').style.width = optionId === 2 ? '55%' : '35%';
        
        // Update percentages in text
        document.getElementById('pct-1').innerText = optionId === 1 ? '65%' : '45%';
        document.getElementById('pct-2').innerText = optionId === 2 ? '55%' : '35%';
      }, 50);
    }
  </script>
</head>
<body class="bg-neutral-100 flex items-center justify-center min-h-screen font-sans antialiased text-[#4A443F]">
  <!-- Mobile Container -->
  <div class="relative w-full max-w-[375px] h-[812px] bg-[#F9F7F3] shadow-2xl overflow-hidden flex flex-col border-[8px] border-neutral-900 rounded-[50px]">
    
    <!-- Header NavBar -->
    <div class="shrink-0 z-50 bg-[#F9F7F3]/80 backdrop-blur-md">
      <div class="h-11 w-full"></div>
      <div class="h-11 w-full flex items-center justify-between px-4 relative">
        <div class="w-20 flex items-center active-overlay cursor-pointer" onclick="window.location.href='02-profile.html'">
          <svg class="w-5 h-5 text-[#2D2926]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </div>
        <h2 class="text-[17px] font-bold text-[#2D2926]">功能许愿池</h2>
        <!-- 胶囊菜单占位 -->
        <div class="w-[87px]"></div>
      </div>
    </div>

    <!-- Scrollable Body -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-10 px-4 mt-2">
      
      <!-- Greeting and Intro -->
      <section class="mt-4 mb-6" id="intro-section">
        <div class="flex items-center space-x-2 mb-2">
          <span class="text-2xl">🌱</span>
          <h1 class="text-xl font-bold text-[#2D2926]">一起种下未来</h1>
        </div>
        <p class="text-[13px] text-[#8C847E] leading-relaxed">
          我们正在规划萱草日签的下一个版图。你最期待优先用到哪项功能？请郑重地投出你的一票。得票数最高的功能将会优先上线！
        </p>
      </section>

      <!-- Voting Options -->
      <section id="voting-cards" class="space-y-4">
        
        <!-- Option 1 -->
        <div class="bg-white rounded-[24px] p-5 shadow-brand-sm border border-transparent active-overlay cursor-pointer relative overflow-hidden group" onclick="castVote(1)">
          <div class="absolute right-0 top-0 w-24 h-24 bg-brand-primary/5 rounded-bl-[100px] pointer-events-none"></div>
          <div class="flex items-start">
             <div class="w-12 h-12 rounded-2xl bg-orange-50 flex flex-shrink-0 items-center justify-center text-brand-primary">
               <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" opacity="0.3"></path></svg>
             </div>
             <div class="ml-4">
               <h3 class="text-[16px] font-bold text-[#2D2926]">扫码智能添药</h3>
               <p class="text-[11px] text-[#8C847E] mt-1 leading-snug">对准药盒条形码扫一扫，自动识别药品名称、用法用量，告别繁琐的手动输入。</p>
             </div>
          </div>
          <div class="mt-4 border-t border-neutral-50 pt-3 flex justify-between items-center">
            <div class="flex -space-x-1">
              <img class="w-5 h-5 rounded-full border border-white" src="https://api.dicebear.com/7.x/notionists/svg?seed=A" alt="">
              <img class="w-5 h-5 rounded-full border border-white" src="https://api.dicebear.com/7.x/notionists/svg?seed=B" alt="">
              <img class="w-5 h-5 rounded-full border border-white" src="https://api.dicebear.com/7.x/notionists/svg?seed=C" alt="">
              <span class="w-5 h-5 rounded-full border border-white bg-neutral-100 flex items-center justify-center text-[8px] text-neutral-400 font-bold">+1.2k</span>
            </div>
            <button class="bg-brand-primary text-white text-[12px] font-bold px-4 py-1.5 rounded-full shadow-sm group-active:scale-[0.95] transition-transform pointer-events-none">
              投它一票
            </button>
          </div>
        </div>

        <!-- Option 2 -->
        <div class="bg-white rounded-[24px] p-5 shadow-brand-sm border border-transparent active-overlay cursor-pointer relative overflow-hidden group" onclick="castVote(2)">
          <div class="absolute right-0 top-0 w-24 h-24 bg-green-500/5 rounded-bl-[100px] pointer-events-none"></div>
          <div class="flex items-start">
             <div class="w-12 h-12 rounded-2xl bg-green-50 flex flex-shrink-0 items-center justify-center text-feedback-success">
               <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
             </div>
             <div class="ml-4">
               <h3 class="text-[16px] font-bold text-[#2D2926]">家庭健康周报</h3>
               <p class="text-[11px] text-[#8C847E] mt-1 leading-snug">每周生成全家人的打卡情况和异常总结，可一键转发至微信群向家人们汇报。</p>
             </div>
          </div>
          <div class="mt-4 border-t border-neutral-50 pt-3 flex justify-between items-center">
            <div class="flex -space-x-1">
              <img class="w-5 h-5 rounded-full border border-white" src="https://api.dicebear.com/7.x/notionists/svg?seed=D" alt="">
              <img class="w-5 h-5 rounded-full border border-white" src="https://api.dicebear.com/7.x/notionists/svg?seed=E" alt="">
              <img class="w-5 h-5 rounded-full border border-white" src="https://api.dicebear.com/7.x/notionists/svg?seed=F" alt="">
              <span class="w-5 h-5 rounded-full border border-white bg-neutral-100 flex items-center justify-center text-[8px] text-neutral-400 font-bold">+890</span>
            </div>
            <button class="bg-feedback-success text-white text-[12px] font-bold px-4 py-1.5 rounded-full shadow-sm group-active:scale-[0.95] transition-transform pointer-events-none">
              投它一票
            </button>
          </div>
        </div>
      </section>

      <!-- Results View (Hidden initially) -->
      <section id="voting-results" class="hidden space-y-6">
        <div class="bg-white rounded-[24px] p-6 shadow-brand-sm flex flex-col items-center">
           <div class="w-16 h-16 bg-brand-primary/10 rounded-full flex items-center justify-center text-brand-primary mb-3">
             <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
           </div>
           <h3 class="text-[17px] font-bold text-[#2D2926]">投票成功！</h3>
           <p class="text-[12px] text-[#8C847E] mt-1 text-center">感谢你为萱草日签添砖加瓦，<br>产品经理已经在爆肝中了哦。</p>
        </div>

        <div class="space-y-6">
           <h4 class="text-[14px] font-bold text-[#2D2926] px-1 text-center">当前票数对决战况</h4>
           
           <div class="bg-white rounded-[24px] p-5 shadow-brand-sm">
             <!-- Bar 1 -->
             <div class="mb-5">
               <div class="flex justify-between items-end mb-2">
                 <span class="text-[13px] font-bold text-[#2D2926]">扫码智能添药</span>
                 <span id="pct-1" class="text-[15px] font-black text-brand-primary">--%</span>
               </div>
               <div class="w-full h-3 bg-neutral-100 rounded-full overflow-hidden">
                 <div id="bar-1" class="progress-bar h-full bg-brand-primary rounded-full w-0"></div>
               </div>
             </div>

             <!-- Bar 2 -->
             <div>
               <div class="flex justify-between items-end mb-2">
                 <span class="text-[13px] font-bold text-[#2D2926]">家庭健康周报</span>
                 <span id="pct-2" class="text-[15px] font-black text-feedback-success">--%</span>
               </div>
               <div class="w-full h-3 bg-neutral-100 rounded-full overflow-hidden">
                 <div id="bar-2" class="progress-bar h-full bg-feedback-success rounded-full w-0"></div>
               </div>
             </div>
           </div>
        </div>
        
        <div class="pt-4">
          <button onclick="window.location.href='02-profile.html'" class="w-full bg-neutral-100 text-[#4A443F] font-bold text-[15px] py-4 rounded-full active:scale-[0.98] transition-transform flex justify-center items-center">
            返回我的页面
          </button>
        </div>

      </section>

    </div>

    <!-- 安全区底色适配 -->
    <div class="absolute bottom-0 w-full h-[env(safe-area-inset-bottom)] bg-[#F9F7F3]"></div>
    <!-- 安全区提示条 (iOS Home Indicator) -->
    <div class="absolute bottom-1 w-1/3 h-1.5 bg-neutral-300 rounded-full left-1/2 -translate-x-1/2 opacity-50"></div>

  </div>
</body>
</html>
