<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - 添加用药提醒</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'rgb(var(--brand-primary) / <alpha-value>)',
              secondary: 'rgb(var(--brand-secondary) / <alpha-value>)',
              'primary-muted': 'rgb(var(--brand-primary-muted) / <alpha-value>)',
            },
          },
          boxShadow: {
            'brand-sm': '0 2px 4px -1px rgb(var(--shadow-color) / 0.06), 0 1px 2px -1px rgb(var(--shadow-color) / 0.04)',
            'brand-md': '0 4px 6px -1px rgb(var(--shadow-color) / 0.1), 0 2px 4px -2px rgb(var(--shadow-color) / 0.05)',
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .active-overlay { position: relative; overflow: hidden; }
    .active-overlay::after { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0); transition: background-color 0.1s; pointer-events: none; }
    .active-overlay:active::after { background-color: rgba(0,0,0,0.08); }

    input[type="time"]::-webkit-calendar-picker-indicator { background: transparent; bottom: 0; color: transparent; cursor: pointer; height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto; }

    .group-chip { transition: background-color 0.15s, color 0.15s, box-shadow 0.15s; white-space: nowrap; }
    .group-chip.active { background-color: rgb(var(--brand-primary)); color: #fff; box-shadow: 0 4px 12px -4px rgb(var(--brand-primary) / 0.5); }

    /* 渐隐遮罩套在可滚动区域右侧 */
    .scroll-fade-right { position: relative; }
    .scroll-fade-right::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 40px;
      background: linear-gradient(to right, transparent, white);
      pointer-events: none;
      z-index: 1;
    }

    /* Pro Toast */
    #pro-hint {
      transition: opacity 0.2s, transform 0.2s;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }
    #pro-hint.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  </style>
</head>
<body class="bg-neutral-100 flex items-center justify-center min-h-screen font-sans antialiased text-[#4A443F]">

  <div class="relative w-full max-w-[375px] h-[812px] bg-white shadow-2xl overflow-hidden flex flex-col border-[8px] border-neutral-900 rounded-[50px]">

    <!-- Header -->
    <div class="shrink-0 z-50 bg-white/90 backdrop-blur-md pb-2">
      <div class="h-11 w-full"></div>
      <div class="h-11 w-full flex items-center justify-between px-4">
        <div class="w-[87px] flex items-center active-overlay cursor-pointer" onclick="window.history.back()">
          <span class="text-[#2D2926] text-[17px] font-bold">取消</span>
        </div>
        <h2 class="text-[19px] font-bold text-[#2D2926]">新建用药提醒</h2>
        <div class="w-[87px] h-8 bg-black/5 rounded-full border border-black/5 flex items-center justify-around px-2 py-1 opacity-40">
          <div class="w-1.5 h-1.5 rounded-full bg-black"></div>
          <div class="w-1 h-1 rounded-full bg-black"></div>
          <div class="w-[1px] h-3 bg-black/20"></div>
          <div class="w-4 h-4 rounded-full border-2 border-black"></div>
        </div>
      </div>
    </div>

    <!-- Body -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32 px-5">

      <!-- 🌟 Module 0: 服药人两层选择 -->
      <section class="mt-4 mb-8">
        <h3 class="text-base font-bold text-[#8C847E] mb-4 px-1">为谁设置提醒？</h3>

        <!--
          布局说明：
          ┌──────┬───────────────────────────────┬──┬──────────────┐
          │ 自己 │  ← 可横向滚动的家庭组 chips →  │  │ + 新建家庭组 │
          └──────┴───────────────────────────────┴──┴──────────────┘
          「自己」和「+ 新建家庭组」均在 overflow 容器外，始终可见。
          中间滚动区域有右侧渐隐遮罩。
        -->
        <div class="flex items-center gap-2 mb-5">

          <!-- ① 固定左端：自己 -->
          <div id="chip-self"
               class="group-chip active shrink-0 px-4 py-1.5 rounded-full text-[13px] font-bold cursor-pointer bg-[#F9F7F3] text-[#8C847E] border border-black/5 active-overlay"
               onclick="selectGroup('self')">自己</div>

          <!-- ② 可横向滚动区域：家庭组列表（含渐隐遮罩） -->
          <div class="scroll-fade-right flex-1 min-w-0">
            <div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-1 pr-8">

              <!-- 「我的家庭」默认组（所有用户有，不可删） -->
              <div id="chip-home"
                   class="group-chip shrink-0 px-4 py-1.5 rounded-full text-[13px] font-bold cursor-pointer bg-[#F9F7F3] text-[#8C847E] border border-black/5 active-overlay"
                   onclick="selectGroup('home')">我的家庭</div>

              <!-- 以下为 Pro 用户额外创建的家庭组（演示多组滚动场景） -->
              <div id="chip-parents"
                   class="group-chip shrink-0 px-4 py-1.5 rounded-full text-[13px] font-bold cursor-pointer bg-[#F9F7F3] text-[#8C847E] border border-black/5 active-overlay"
                   onclick="selectGroup('parents')">父母组</div>
              <div id="chip-inlaws"
                   class="group-chip shrink-0 px-4 py-1.5 rounded-full text-[13px] font-bold cursor-pointer bg-[#F9F7F3] text-[#8C847E] border border-black/5 active-overlay"
                   onclick="selectGroup('inlaws')">岳父母组</div>
              <div id="chip-couple"
                   class="group-chip shrink-0 px-4 py-1.5 rounded-full text-[13px] font-bold cursor-pointer bg-[#F9F7F3] text-[#8C847E] border border-black/5 active-overlay"
                   onclick="selectGroup('couple')">夫妻组</div>

            </div>
          </div>

          <!-- ③ 固定右端：分隔线 + 新建家庭组（Pro 锁，始终可见） -->
          <div class="shrink-0 flex items-center pl-2 border-l border-neutral-200">
            <div class="shrink-0 flex items-center gap-1 px-3 py-1.5 rounded-full text-[12px] font-bold cursor-pointer bg-amber-50 text-amber-600 border border-amber-200/80 active-overlay"
                 onclick="showProHint()">
              <svg class="w-3 h-3 shrink-0" fill="currentColor" viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
              </svg>新建
            </div>
          </div>

        </div>

        <!-- Pro Toast（绝对定位，不受 overflow 影响） -->
        <div id="pro-hint"
             class="absolute left-5 right-5 z-[90] bg-[#2D2926] text-white text-[13px] rounded-2xl px-4 py-3 flex items-center shadow-xl"
             style="top: 186px;">
          <svg class="w-4 h-4 mr-2 text-amber-400 shrink-0" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 6h2v2h-2V7zm0 4h2v6h-2v-6z"/>
          </svg>
          <span>新建家庭组需要 <strong class="text-amber-400">Pro</strong> 账户。升级后再试吧。</span>
        </div>

        <!-- ── Layer 2A: 自己模式 ── -->
        <div id="panel-self" class="flex items-center space-x-4 overflow-x-auto no-scrollbar pb-2 pt-1 -ml-1 pl-1">
          <div class="flex flex-col items-center">
            <div class="w-14 h-14 rounded-full border-2 border-brand-primary p-0.5">
              <div class="w-full h-full rounded-full bg-brand-primary text-white flex items-center justify-center font-bold text-base">我</div>
            </div>
            <span class="text-[13px] font-bold text-brand-primary mt-2">自己</span>
          </div>
        </div>

        <!-- ── Layer 2B: 我的家庭（Free 默认组） ── -->
        <div id="panel-home" class="hidden">
          <div class="flex items-center space-x-4 overflow-x-auto no-scrollbar pb-2 pt-1 -ml-1 pl-1">
            <div class="demo-member flex flex-col items-center cursor-pointer active-overlay group opacity-60 grayscale hover:opacity-100 hover:grayscale-0 transition-all" onclick="selectMember(this)">
              <div class="w-14 h-14 rounded-full border-2 border-transparent p-0.5 transition-all relative">
                <img class="w-full h-full rounded-full" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=fce7f3" alt="">
                <div class="absolute bottom-0 -right-1 w-5 h-5 bg-amber-500 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                  <svg class="w-2.5 h-2.5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </div>
              </div>
              <span class="text-[13px] font-medium text-[#8C847E] mt-2 transition-colors">爸爸</span>
            </div>
            <div class="demo-member flex flex-col items-center cursor-pointer active-overlay group opacity-60 grayscale hover:opacity-100 hover:grayscale-0 transition-all" onclick="selectMember(this)">
              <div class="w-14 h-14 rounded-full border-2 border-transparent p-0.5 transition-all relative">
                <img class="w-full h-full rounded-full" src="https://api.dicebear.com/7.x/notionists/svg?seed=Anna&backgroundColor=dbeafe" alt="">
                <div class="absolute bottom-0 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                  <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8.5 13.5c-2.48 0-4.5-1.79-4.5-4s2.02-4 4.5-4 4.5 1.79 4.5 4-2.02 4-4.5 4zm6.5 6c-2.21 0-4-1.34-4-3s1.79-3 4-3 4 1.34 4 3-1.79 3-4 3z"/></svg>
                </div>
              </div>
              <span class="text-[13px] font-medium text-[#8C847E] mt-2 transition-colors">妈妈</span>
            </div>
            <div id="btn-add-member-home" class="flex flex-col items-center cursor-pointer active-overlay group shrink-0" onclick="showAddShadowInput('home')">
              <div class="w-14 h-14 rounded-full border-2 border-dashed border-neutral-300 flex items-center justify-center bg-neutral-50 group-hover:border-brand-primary group-hover:bg-brand-primary/5 transition-all">
                <svg class="w-5 h-5 text-neutral-400 group-hover:text-brand-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
              </div>
              <span class="text-[13px] font-medium text-neutral-400 group-hover:text-brand-primary mt-2 transition-colors">新建成员</span>
            </div>
          </div>
          
          <!-- 新手引导气泡 -->
          <div id="new-user-guide" class="hidden mt-1 mb-2 animate-bounce">
            <div class="inline-block bg-brand-primary text-white text-[12px] font-bold px-3 py-1.5 rounded-lg shadow-sm relative">
              👇 第一步：告诉我们长辈的称呼
              <div class="absolute -bottom-1 left-6 w-2 h-2 bg-brand-primary rotate-45"></div>
            </div>
          </div>
          <div id="shadow-input-home" class="hidden mt-3 bg-[#F9F7F3] p-3 rounded-2xl flex items-center shadow-inner">
            <input type="text" placeholder="称呼，如：老伴儿..." class="bg-transparent flex-1 text-[13px] text-[#2D2926] font-bold focus:outline-none placeholder:text-neutral-400 placeholder:font-normal" id="shadow-name-home">
            <div class="bg-brand-primary text-white text-[11px] font-bold px-3 py-1.5 rounded-full cursor-pointer ml-3 active-overlay shadow-sm" onclick="addNewShadow('home')">保存</div>
          </div>
        </div>

        <!-- ── Layer 2C: 父母组（Pro 示范） ── -->
        <div id="panel-parents" class="hidden">
          <div class="flex items-center space-x-4 overflow-x-auto no-scrollbar pb-2 pt-1 -ml-1 pl-1">
            <div class="flex flex-col items-center cursor-pointer active-overlay group opacity-60 grayscale hover:opacity-100 hover:grayscale-0 transition-all" onclick="selectMember(this)">
              <div class="w-14 h-14 rounded-full border-2 border-transparent p-0.5 relative">
                <img class="w-full h-full rounded-full" src="https://api.dicebear.com/7.x/notionists/svg?seed=Bob&backgroundColor=fef9c3" alt="">
                <div class="absolute bottom-0 -right-1 w-5 h-5 bg-amber-500 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                  <svg class="w-2.5 h-2.5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </div>
              </div>
              <span class="text-[13px] font-medium text-[#8C847E] mt-2 transition-colors">爷爷</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer active-overlay group opacity-60 grayscale hover:opacity-100 hover:grayscale-0 transition-all" onclick="selectMember(this)">
              <div class="w-14 h-14 rounded-full border-2 border-transparent p-0.5 relative">
                <img class="w-full h-full rounded-full" src="https://api.dicebear.com/7.x/notionists/svg?seed=Grace&backgroundColor=d1fae5" alt="">
                <div class="absolute bottom-0 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                  <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8.5 13.5c-2.48 0-4.5-1.79-4.5-4s2.02-4 4.5-4 4.5 1.79 4.5 4-2.02 4-4.5 4zm6.5 6c-2.21 0-4-1.34-4-3s1.79-3 4-3 4 1.34 4 3-1.79 3-4 3z"/></svg>
                </div>
              </div>
              <span class="text-[13px] font-medium text-[#8C847E] mt-2 transition-colors">奶奶</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer active-overlay group shrink-0" onclick="showAddShadowInput('parents')">
              <div class="w-14 h-14 rounded-full border-2 border-dashed border-neutral-300 flex items-center justify-center bg-neutral-50 group-hover:border-brand-primary group-hover:bg-brand-primary/5 transition-all">
                <svg class="w-5 h-5 text-neutral-400 group-hover:text-brand-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
              </div>
              <span class="text-[13px] font-medium text-neutral-400 group-hover:text-brand-primary mt-2 transition-colors">新建成员</span>
            </div>
          </div>
          <div id="shadow-input-parents" class="hidden mt-3 bg-[#F9F7F3] p-3 rounded-2xl flex items-center shadow-inner">
            <input type="text" placeholder="称呼，如：外公..." class="bg-transparent flex-1 text-[13px] text-[#2D2926] font-bold focus:outline-none placeholder:text-neutral-400 placeholder:font-normal" id="shadow-name-parents">
            <div class="bg-brand-primary text-white text-[11px] font-bold px-3 py-1.5 rounded-full cursor-pointer ml-3 active-overlay shadow-sm" onclick="addNewShadow('parents')">保存</div>
          </div>
        </div>

        <!-- ── Layer 2D: 岳父母组（Pro 示范） ── -->
        <div id="panel-inlaws" class="hidden">
          <div class="flex items-center space-x-4 overflow-x-auto no-scrollbar pb-2 pt-1 -ml-1 pl-1">
            <div class="flex flex-col items-center cursor-pointer active-overlay group opacity-60 grayscale hover:opacity-100 hover:grayscale-0 transition-all" onclick="selectMember(this)">
              <div class="w-14 h-14 rounded-full border-2 border-transparent p-0.5 relative">
                <img class="w-full h-full rounded-full" src="https://api.dicebear.com/7.x/notionists/svg?seed=Henry&backgroundColor=fce7f3" alt="">
                <div class="absolute bottom-0 -right-1 w-5 h-5 bg-amber-500 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                  <svg class="w-2.5 h-2.5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </div>
              </div>
              <span class="text-[13px] font-medium text-[#8C847E] mt-2 transition-colors">岳父</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer active-overlay group shrink-0" onclick="showAddShadowInput('inlaws')">
              <div class="w-14 h-14 rounded-full border-2 border-dashed border-neutral-300 flex items-center justify-center bg-neutral-50 group-hover:border-brand-primary group-hover:bg-brand-primary/5 transition-all">
                <svg class="w-5 h-5 text-neutral-400 group-hover:text-brand-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
              </div>
              <span class="text-[13px] font-medium text-neutral-400 group-hover:text-brand-primary mt-2 transition-colors">新建成员</span>
            </div>
          </div>
          <div id="shadow-input-inlaws" class="hidden mt-3 bg-[#F9F7F3] p-3 rounded-2xl flex items-center shadow-inner">
            <input type="text" placeholder="称呼，如：岳母..." class="bg-transparent flex-1 text-[13px] text-[#2D2926] font-bold focus:outline-none placeholder:text-neutral-400 placeholder:font-normal" id="shadow-name-inlaws">
            <div class="bg-brand-primary text-white text-[11px] font-bold px-3 py-1.5 rounded-full cursor-pointer ml-3 active-overlay shadow-sm" onclick="addNewShadow('inlaws')">保存</div>
          </div>
        </div>

        <!-- ── Layer 2E: 夫妻组（Pro 示范） ── -->
        <div id="panel-couple" class="hidden">
          <div class="flex items-center space-x-4 overflow-x-auto no-scrollbar pb-2 pt-1 -ml-1 pl-1">
            <div class="flex flex-col items-center cursor-pointer active-overlay group opacity-60 grayscale hover:opacity-100 hover:grayscale-0 transition-all" onclick="selectMember(this)">
              <div class="w-14 h-14 rounded-full border-2 border-transparent p-0.5 relative">
                <img class="w-full h-full rounded-full" src="https://api.dicebear.com/7.x/notionists/svg?seed=Lily&backgroundColor=ede9fe" alt="">
                <div class="absolute bottom-0 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                  <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8.5 13.5c-2.48 0-4.5-1.79-4.5-4s2.02-4 4.5-4 4.5 1.79 4.5 4-2.02 4-4.5 4zm6.5 6c-2.21 0-4-1.34-4-3s1.79-3 4-3 4 1.34 4 3-1.79 3-4 3z"/></svg>
                </div>
              </div>
              <span class="text-[13px] font-medium text-[#8C847E] mt-2 transition-colors">老伴儿</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer active-overlay group shrink-0" onclick="showAddShadowInput('couple')">
              <div class="w-14 h-14 rounded-full border-2 border-dashed border-neutral-300 flex items-center justify-center bg-neutral-50 group-hover:border-brand-primary group-hover:bg-brand-primary/5 transition-all">
                <svg class="w-5 h-5 text-neutral-400 group-hover:text-brand-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
              </div>
              <span class="text-[13px] font-medium text-neutral-400 group-hover:text-brand-primary mt-2 transition-colors">新建成员</span>
            </div>
          </div>
          <div id="shadow-input-couple" class="hidden mt-3 bg-[#F9F7F3] p-3 rounded-2xl flex items-center shadow-inner">
            <input type="text" placeholder="称呼..." class="bg-transparent flex-1 text-[13px] text-[#2D2926] font-bold focus:outline-none placeholder:text-neutral-400 placeholder:font-normal" id="shadow-name-couple">
            <div class="bg-brand-primary text-white text-[11px] font-bold px-3 py-1.5 rounded-full cursor-pointer ml-3 active-overlay shadow-sm" onclick="addNewShadow('couple')">保存</div>
          </div>
        </div>

      </section>

      <!-- 分隔线 -->
      <div class="w-full h-px bg-neutral-100 mb-8"></div>

      <!-- 🌟 Module 1: 药名输入 -->
      <section class="mb-10">
        <h3 class="text-base font-bold text-[#8C847E] mb-2 relative">
          药的名字是？
          <span class="absolute right-0 text-xs text-brand-primary/80 font-normal underline decoration-dashed underline-offset-2 cursor-pointer mt-1">扫一下药盒装个样子</span>
        </h3>
        <div class="relative border-b-2 border-neutral-200 focus-within:border-brand-primary transition-colors pb-1">
          <input type="text" placeholder="简写，如：降压药" class="w-full bg-transparent text-[22px] font-bold text-[#2D2926] min-h-[56px] py-2 placeholder:text-neutral-300 placeholder:font-normal focus:outline-none placeholder:text-[18px]">
        </div>
      </section>

      <!-- 🌟 Module 2: 用量及快捷胶囊 -->
      <section class="mb-10">
        <h3 class="text-base font-bold text-[#8C847E] mb-3">每次吃多少？</h3>
        <div class="relative border-b-2 border-neutral-200 focus-within:border-brand-primary transition-colors pb-1 flex items-center">
          <input type="text" id="dosage-input" placeholder="如：半个瓶盖" class="w-full bg-transparent text-[20px] font-bold text-[#2D2926] min-h-[56px] py-2 placeholder:text-neutral-300 placeholder:font-normal focus:outline-none placeholder:text-[16px]">
        </div>
        <div class="flex flex-wrap gap-2.5 mt-5">
          <div class="bg-[#F9F7F3] border border-black/5 text-[#8C847E] text-[14px] font-bold px-5 py-2.5 rounded-full cursor-pointer active-overlay hover:bg-neutral-100 transition-colors" onclick="fillDosage('1 片')">💊 1 片</div>
          <div class="bg-[#F9F7F3] border border-black/5 text-[#8C847E] text-[14px] font-bold px-5 py-2.5 rounded-full cursor-pointer active-overlay hover:bg-neutral-100 transition-colors" onclick="fillDosage('2 粒')">💊 2 粒</div>
          <div class="bg-[#F9F7F3] border border-black/5 text-[#8C847E] text-[14px] font-bold px-5 py-2.5 rounded-full cursor-pointer active-overlay hover:bg-neutral-100 transition-colors" onclick="fillDosage('半片')">🔪 半片</div>
          <div class="bg-[#F9F7F3] border border-black/5 text-[#8C847E] text-[14px] font-bold px-5 py-2.5 rounded-full cursor-pointer active-overlay hover:bg-neutral-100 transition-colors" onclick="fillDosage('1 包')">📦 1 包</div>
        </div>
      </section>

      <!-- 🌟 Module 3: 提醒时间与周期 -->
      <section class="mb-10">
        <h3 class="text-base font-bold text-[#8C847E] mb-4">要在哪个时间提醒？</h3>
        <div class="flex items-center space-x-6">
          <div class="relative w-[140px] min-h-[80px] py-3 bg-[#F9F7F3] rounded-[24px] flex items-center justify-center border-2 border-transparent focus-within:border-brand-primary active-overlay px-4">
            <input type="time" value="08:00" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="document.getElementById('time-display').innerText = this.value">
            <span id="time-display" class="text-[36px] font-bold text-[#2D2926] tracking-tight">08:00</span>
          </div>
          <div class="flex-1">
            <div class="text-[14px] font-bold text-[#8C847E] mb-3">重复频次</div>
            <select class="w-full bg-[#F9F7F3] text-[#2D2926] text-[16px] font-bold min-h-[48px] py-2 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-primary appearance-none">
              <option value="daily" selected>每天</option>
              <option value="every-other">隔天一次</option>
              <option value="specific-day">特定星期...</option>
              <option value="custom-cycle">做几休几...</option>
            </select>
          </div>
        </div>
      </section>

    </div>

    <!-- Bottom Action -->
    <div class="absolute bottom-0 w-full bg-white/90 backdrop-blur-xl border-t border-neutral-100 pt-4 pb-[env(safe-area-inset-bottom)] px-5 z-50">
      <button class="w-full flex items-center justify-center bg-brand-primary text-white text-[18px] font-bold min-h-[56px] py-4 rounded-full shadow-[0_8px_20px_-8px_rgba(234,88,12,0.6)] cursor-pointer active-overlay transition-transform duration-200 transform active:scale-[0.98] mb-2"
              onclick="window.location.href='03-plan-list.html'">
        保存并开启提醒
      </button>
    </div>

    <div class="absolute bottom-0 w-full h-[env(safe-area-inset-bottom)] bg-white z-[60]"></div>
    <div class="absolute bottom-1 w-1/3 h-1.5 bg-neutral-300 rounded-full left-1/2 -translate-x-1/2 opacity-50 z-[70]"></div>

  </div>

  <script>
    const ALL_GROUPS = ['self', 'home', 'parents', 'inlaws', 'couple'];

    // ── Layer 1: 家庭组切换 ──────────────────────────────────────
    function selectGroup(id) {
      ALL_GROUPS.forEach(g => {
        const chip  = document.getElementById('chip-' + g);
        const panel = document.getElementById('panel-' + g);
        const active = (g === id);
        if (chip)  active ? chip.classList.add('active')    : chip.classList.remove('active');
        if (panel) active ? panel.classList.remove('hidden'): panel.classList.add('hidden');
      });
      // 收起所有影子输入框
      document.querySelectorAll('[id^="shadow-input-"]').forEach(el => el.classList.add('hidden'));
    }

    // ── Layer 2: 成员选中 ────────────────────────────────────────
    function selectMember(element) {
      const panel = element.closest('[id^="panel-"]');
      if (panel) {
        panel.querySelectorAll('[onclick="selectMember(this)"]').forEach(el => {
          el.classList.add('opacity-60', 'grayscale');
          const ring = el.querySelector('.border-2');
          if (ring) { ring.classList.add('border-transparent'); ring.classList.remove('border-brand-primary'); }
          const lbl = el.querySelector('span');
          if (lbl) { lbl.classList.add('text-[#8C847E]', 'font-medium'); lbl.classList.remove('text-brand-primary', 'font-bold'); }
        });
      }
      element.classList.remove('opacity-60', 'grayscale');
      const ring = element.querySelector('.border-2');
      if (ring) { ring.classList.remove('border-transparent'); ring.classList.add('border-brand-primary'); }
      const lbl = element.querySelector('span');
      if (lbl) { lbl.classList.remove('text-[#8C847E]', 'font-medium'); lbl.classList.add('text-brand-primary', 'font-bold'); }
      document.querySelectorAll('[id^="shadow-input-"]').forEach(el => el.classList.add('hidden'));
    }

    // ── 新建影子成员 ─────────────────────────────────────────────
    function showAddShadowInput(groupId) {
      const inputBox = document.getElementById('shadow-input-' + groupId);
      if (!inputBox) return;
      // 收起其他组的输入框
      document.querySelectorAll('[id^="shadow-input-"]').forEach(el => el.classList.add('hidden'));
      inputBox.classList.toggle('hidden');
      if (!inputBox.classList.contains('hidden')) {
        inputBox.querySelector('input').focus();
      }
    }

    function addNewShadow(groupId) {
      const input = document.getElementById('shadow-name-' + groupId);
      if (!input || input.value.trim() === '') return;
      alert('前端演练：在「' + groupId + '」组新建影子成员 [' + input.value + '] 成功！');
      document.getElementById('shadow-input-' + groupId).classList.add('hidden');
      input.value = '';
    }

    // ── 剂量快填 ─────────────────────────────────────────────────
    function fillDosage(val) {
      document.getElementById('dosage-input').value = val;
    }

    // ── Pro 升级提示 Toast ────────────────────────────────────────
    let proTimer = null;
    function showProHint() {
      const hint = document.getElementById('pro-hint');
      hint.classList.add('show');
      clearTimeout(proTimer);
      proTimer = setTimeout(() => hint.classList.remove('show'), 2800);
    }

    // ── 初始化逻辑 (URL 参数承接) ──────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const role = urlParams.get('role');
      
      if (role === 'family' || role === 'family_new') {
        // 如果是从“我是照护者”点进来的，自动选中“我的家庭”以缩短用户路径
        selectGroup('home');
        
        // 视觉居中
        const chipHome = document.getElementById('chip-home');
        if(chipHome) {
          chipHome.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        // 核心体验优化：如果是一个纯新照护者
        if (role === 'family_new') {
          // 1. 隐藏演示用的老成员和新增按钮
          document.querySelectorAll('#panel-home .demo-member').forEach(el => el.classList.add('hidden'));
          const btnAdd = document.getElementById('btn-add-member-home');
          if (btnAdd) btnAdd.classList.add('hidden');
          
          // 2. 自动展开名称输入框，让用户无缝起名
          const inputBox = document.getElementById('shadow-input-home');
          inputBox.classList.remove('hidden');
          inputBox.classList.add('ring-2', 'ring-brand-primary/50'); // 给一点高亮
          
          // 3. 显示温馨的气泡引导
          document.getElementById('new-user-guide').classList.remove('hidden');
          
          // 4. 自动聚焦 (由于移动端限制，键盘可能不会直接弹，但光标会就位)
          setTimeout(() => {
            document.getElementById('shadow-name-home').focus();
          }, 300);
        }
      }
    });
  </script>
</body>
</html>
